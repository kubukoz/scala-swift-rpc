# Builds the Swift host (`ssr-app`) on macOS and attaches it to the GitHub
# release for the pushed `v*` tag. sbt-ssr's default host source
# (SsrHostSource.Release) fetches this asset, pinned to the library version —
# so the host binary and the Maven artifacts always ship under the same tag.
#
# This is hand-maintained (not generated by sbt-typelevel): the host is a
# SwiftPM build, outside sbt's publish pipeline. It complements ci.yml's
# `publish` job rather than replacing it.
name: Host Release

on:
  push:
    tags: [v*]

jobs:
  host:
    name: Build and attach host binary
    runs-on: macos-14
    permissions:
      contents: write
    steps:
      - name: Checkout current branch (full)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Setup sbt
        uses: sbt/setup-sbt@v1

      - name: Setup Java (temurin@21)
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21
          cache: sbt

      # swiftCodegenOutput regenerates WireTypes.swift, swiftBuild runs
      # `swift build -c release` and copies the binary to build/ssr-app.
      - name: Build Swift host
        run: sbt swiftBuild

      - name: Rename asset to match the release tag layout
        run: cp build/ssr-app ssr-app

      - name: Attach host binary to the release
        uses: softprops/action-gh-release@v2
        with:
          files: ssr-app
          fail_on_unmatched_files: true
